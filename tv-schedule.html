<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Schedule - Sport Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050508;
      --bg-card: #12121b;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0f0f5;
      --muted: #71717a;
      --accent: #ff4757;
      --green: #34d399;
    }

    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 15%, rgba(255, 71, 87, 0.08) 0%, transparent 40%),
        radial-gradient(circle at center, #0d0d1a 0%, #050508 100%);
      background-attachment: fixed;
      background-size: cover;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    header, main, footer, .topbar {
      width: 100%;
      padding-left: 30px;
      padding-right: 30px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      height: 64px;
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
    }

    .back-btn {
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      transition: 0.2s;
    }

    .back-btn:hover { color: var(--accent); }

    header { padding-top: 60px; padding-bottom: 40px; }
    
    .header-title-wrapper { display: flex; align-items: center; gap: 20px; }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 6vw, 80px);
      line-height: 1;
    }

    .header-title span { color: var(--accent); }

    .schedule-container {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .schedule-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: grid;
      grid-template-columns: 100px 150px 1fr 120px;
      align-items: center;
      gap: 20px;
      transition: 0.3s;
    }

    .schedule-item:hover {
      border-color: rgba(255, 71, 87, 0.3);
      background: #1a1a26;
    }

    .time { font-weight: 700; font-size: 1.2rem; color: var(--accent); }
    .event-info { display: flex; flex-direction: column; }
    .event-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
    .competition { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    
    .status-tag {
        justify-self: end;
        padding: 4px 12px;
        border-radius: 100px;
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        border: 1px solid currentColor;
        white-space: nowrap;
    }

    .status-tag.live {
        color: var(--green);
        border-color: rgba(52, 211, 153, 0.4);
        background: rgba(52, 211, 153, 0.05);
        animation: pulse 2s infinite;
    }
    
    .status-tag.upcoming { color: var(--muted); border-color: var(--border); }
    .status-tag.finished { color: #444; border-color: #222; opacity: 0.5; }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }

    .channels-container {
        display: flex;
        flex-direction: column;
        gap: 5px;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1rem;
        min-width: 150px;
    }

    .channel-tag {
        color: var(--text);
        border-left: 2px solid var(--accent);
        padding-left: 8px;
        display: block;
    }

    .date-header {
        font-family: 'Bebas Neue', sans-serif;
        color: var(--accent);
        font-size: 1.8rem;
        margin: 40px 0 20px 0;
        letter-spacing: 1px;
        border-left: 4px solid var(--accent);
        padding-left: 15px;
        cursor: pointer; /* Face header-ul să pară clicabil */
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
        transition: background 0.2s;
    }

    .date-header:hover {
        background: rgba(255, 71, 87, 0.05);
    }

    /* Indicatorul (săgeata) din dreapta */
    .date-header::after {
        content: '▼';
        font-size: 1rem;
        margin-right: 15px;
        transition: transform 0.3s ease;
    }

    /* Rotește săgeata când e închis */
    .date-header.collapsed::after {
        transform: rotate(-90deg);
    }

    /* Containerul care se ascunde */
    .day-content {
        display: flex;
        flex-direction: column;
        gap: 15px;
        overflow: hidden;
    }

    .day-content.hidden {
        display: none;
    }

    .filters-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 15px;
      padding: 10px 0;
    }

    .filter-pill {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: capitalize;
    }

    .filter-pill:hover { background: rgba(255, 255, 255, 0.1); color: var(--text); }

    .filter-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      box-shadow: 0 0 15px rgba(255, 71, 87, 0.3);
    }

    footer { height: 150px; width: 100%; }
    /* Buton Scroll to Top */
    .scroll-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--accent);
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
      z-index: 1001;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .scroll-top.show {
      opacity: 1;
      visibility: visible;
    }

    .scroll-top:hover {
      transform: translateY(-5px);
      background: #ff5e6c;
      box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6);
    }
    /* --- Responsivitate pentru Mobile --- */
    @media (max-width: 768px) {
      header, main, .topbar {
        padding-left: 15px;
        padding-right: 15px;
      }

      .header-title {
        font-size: 45px; /* Micșorăm titlul pe mobile */
      }

      .schedule-item {
        grid-template-columns: 1fr auto; /* Trecem la 2 coloane principale */
        gap: 12px;
        padding: 16px;
      }

      /* Ora stânga sus, Status dreapta sus */
      .time {
        grid-column: 1;
        grid-row: 1;
        font-size: 1.1rem;
      }

      .status-tag {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
        align-self: center;
      }

      /* Informațiile despre meci ocupă tot rândul de mijloc */
      .event-info {
        grid-column: 1 / span 2;
        grid-row: 2;
        margin: 5px 0;
      }

      /* Canalele trec jos, în format orizontal (row) nu vertical */
      .channels-container {
        grid-column: 1 / span 2;
        grid-row: 3;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 15px;
        margin-top: 8px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .channel-tag {
        border-left: 2px solid var(--accent);
        padding-left: 8px;
      }
      
      .date-header {
        font-size: 1.4rem;
        margin: 30px 0 15px 0;
      }

      .filter-pill {
        padding: 6px 15px;
        font-size: 0.8rem;
      }
    }
    .filters-row {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .filters-row select {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 15px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      min-width: 160px;
      transition: 0.3s;
    }

    .filters-row select:hover {
      border-color: var(--accent);
    }

    .filters-row select option {
      background: var(--bg-card);
      color: var(--text);
    }

    @media (max-width: 768px) {
      .filters-row select {
        flex: 1; /* Pe mobil se întind egal pe rând */
        min-width: 120px;
      }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Home
    </a>
  </nav>

  <header>
    <div class="header-title-wrapper">
      <h1 class="header-title">TV <span>Schedule</span></h1>
    </div>
  </header>

  <main>
   <div class="filters-row">
      <select id="sport-filter" onchange="updateFilters()">
        <option value="all">Toate Sporturile</option>
      </select>
      
      <select id="channel-filter" onchange="updateFilters()">
        <option value="all">Toate Canalele</option>
      </select>

      <select id="status-filter" onchange="updateFilters()">
        <option value="all">Orice Status</option>
        <option value="LIVE">Live Acum</option>
        <option value="UPCOMING">Urmează</option>
        <option value="FINISHED">Încheiate</option>
      </select>
    </div>

    <div class="schedule-container" id="schedule-list"></div>
  </main>
  <button class="scroll-top" id="scrollTopBtn" onclick="scrollToTop()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
  </button>
  <footer></footer>

  <script>
    let rawData = []; 
    let activeFilters = new Set(['all']); 
    let activeChannels = new Set(['all']);
    // Determină statusul în funcție de oră (durată medie 2h)
function getStatus(dateStr, timeStr) {
    const now = new Date();
    const start = new Date(`${dateStr} ${timeStr}`);
    const end = new Date(start.getTime() + 120 * 60000); // +2 ore

    if (now < start) return 'UPCOMING';
    if (now >= start && now <= end) return 'LIVE';
    return 'FINISHED';
}

// Verifică dacă au trecut mai mult de 45 min de la final (total 2h 45m de la start)
function isExpired(dateStr, timeStr) {
    const now = new Date();
    const start = new Date(`${dateStr} ${timeStr}`);
    const expiryTime = new Date(start.getTime() + (120 + 45) * 60000); // 2h meci + 45m grație
    return now > expiryTime;
}

    const staticChannels = [
        "Digi Sport", "Prima Sport", "TVR Sport", "Voyo", 
        "Antena Play", "Max", "Netflix", "Disney+", 
        "Prime Video", "FRF TV", "DAZN", "FIFA+"
    ];

    async function init() {
        try {
            const response = await fetch('schedule.json');
            rawData = await response.json();
           generateFilters();  
    renderSchedule();      
        } catch (e) {
            console.error("Eroare la încărcarea datelor:", e);
        }
    }

  function generateFilters() {
        const sportSelect = document.getElementById('sport-filter');
        const channelSelect = document.getElementById('channel-filter');
        const sportsSet = new Set();
        
        rawData.forEach(day => {
            day.programs.forEach(p => sportsSet.add(p.sport));
        });
        
        sportsSet.forEach(sport => {
            const opt = document.createElement('option');
            opt.value = sport;
            opt.innerText = sport;
            sportSelect.appendChild(opt);
        });

        staticChannels.forEach(ch => {
            const opt = document.createElement('option');
            opt.value = ch;
            opt.innerText = ch;
            channelSelect.appendChild(opt);
        });
    }

    function updateFilters() {
        renderSchedule();
    }

    function renderSchedule() {
        const container = document.getElementById('schedule-list');
        container.innerHTML = '';

        const selSport = document.getElementById('sport-filter').value;
        const selChannel = document.getElementById('channel-filter').value;
        const selStatus = document.getElementById('status-filter').value;

        rawData.forEach(day => {
            let programs = day.programs.filter(p => {
                const currentStatus = getStatus(day.date, p.time);
                
                const sportMatch = selSport === 'all' || p.sport === selSport;
                const channelMatch = selChannel === 'all' || p.channel.toLowerCase().includes(selChannel.toLowerCase());
                const statusMatch = selStatus === 'all' || currentStatus === selStatus;
                
                const expired = isExpired(day.date, p.time);

                return sportMatch && channelMatch && statusMatch && !expired;
            });

            if (programs.length === 0) return;

            const grouped = [];
            programs.forEach(item => {
                const exist = grouped.find(g => g.time === item.time && g.event === item.event);
                if (exist) {
                    if (!exist.channels.includes(item.channel)) exist.channels.push(item.channel);
                } else {
                    grouped.push({ ...item, channels: [item.channel] });
                }
            });

            grouped.sort((a, b) => a.time.localeCompare(b.time));

           const dateHeader = document.createElement('h2');
            dateHeader.className = "date-header";
            dateHeader.innerText = day.date;
            container.appendChild(dateHeader);

            // Creăm un wrapper pentru meciurile din această zi
            const dayContent = document.createElement('div');
            dayContent.className = "day-content";
            container.appendChild(dayContent);

            // Logica de click: ascunde/arată meciurile
            dateHeader.onclick = () => {
                dayContent.classList.toggle('hidden');
                dateHeader.classList.toggle('collapsed');
            };

            grouped.forEach(item => {
                const scheduleItem = document.createElement('div');
                scheduleItem.className = 'schedule-item';
                
                const currentStatus = getStatus(day.date, item.time); 
                const statusClass = `status-tag ${currentStatus.toLowerCase()}`;
                const channelsHtml = item.channels.map(ch => `<span class="channel-tag">${ch}</span>`).join('');

                scheduleItem.innerHTML = `
                    <div class="time">${item.time}</div>
                    <div class="channels-container">${channelsHtml}</div>
                    <div class="event-info">
                        <span class="event-name">${item.event}</span>
                        <span class="competition">${item.competition}</span>
                    </div>
                    <div class="${statusClass}">${currentStatus}</div>
                `;
                // IMPORTANT: Acum adăugăm în dayContent, nu direct în container
                dayContent.appendChild(scheduleItem); 
            });
        });
    }

    const scrollTopBtn = document.getElementById("scrollTopBtn");

    window.onscroll = function() {
        if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
            scrollTopBtn.classList.add("show");
        } else {
            scrollTopBtn.classList.remove("show");
        }
    };

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.onload = init;
  </script>
</body>
</html>
