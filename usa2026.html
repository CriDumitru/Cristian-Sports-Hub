<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USA 2026 — Live Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    #scrollTopBtn {
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 102, 255, 0.3);
}
    :root {
      --bg: #050810;
      --surface: #0f172a;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #0066ff;
      --text: #ffffff;
      --muted: #64748b;
    }
    body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
.home-btn {
      position: absolute; /* Aceasta este setarea care îl împiedică să coboare la scroll */
      top: 18px;
      left: 18px;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(15, 15, 24, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 7px 13px;
      text-decoration: none;
      color: #a1a1aa;
      font-size: .76rem;
      font-weight: 500;
      backdrop-filter: blur(12px);
      transition: all 0.15s;
    }
    .home-btn:hover {
      background: rgba(25, 25, 40, 0.95);
      color: #f4f4f5;
      border-color: rgba(255, 255, 255, 0.2);
    }
    /* Containerul pentru pastile (fără bordură comună) */
    #tabGroup {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      padding: 4px 0;
    }

    /* Pastila de bază (Title Case) */
    .tab-pill {
      padding: 10px 22px;
      font-size: .85rem;
      font-weight: 700;
      color: #64748b; /* var(--muted) */
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      text-transform: none; /* Permite Title Case */
    }

    /* Pastila Activă USA (Albastru) */
    .tab-pill.active.usa-pill {
      background: rgba(0, 102, 255, 0.2) !important;
      color: #60a5fa !important;
      border-color: rgba(0, 102, 255, 0.4) !important;
      box-shadow: 0 4px 15px rgba(0, 102, 255, 0.15);
    }
        .match-card { background: var(--surface); border: 1px solid var(--border); transition: all 0.3s ease; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .header-section { transition: all 0.3s ease; }
    @media (min-width: 768px) { .header-section { padding-left: 100px; } }
  </style>
</head>
<body class="min-h-screen">

  <a href="index.html" class="home-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9,22 9,12 15,12 15,22"/>
    </svg>
    Home
  </a>

  <div class="max-w-[98%] mx-auto px-6 pt-10 pb-12">
    
    <div class="header-section flex flex-col md:flex-row items-end gap-6 mb-10 pl-20 md:pl-28">
  <img src="https://upload.wikimedia.org/wikipedia/en/thumb/1/17/2026_FIFA_World_Cup_emblem.svg/500px-2026_FIFA_World_Cup_emblem.svg.png" 
       alt="USA 2026" 
       style="height:90px; width:auto; filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)) drop-shadow(0 0 2px rgba(255,255,255,0.5));">

  <div class="text-center md:text-left">
    <div style="font-size:.7rem; font-weight:800; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:6px">FIFA World Cup</div>
    <h1 style="font-family:'Bebas Neue'; font-size:clamp(2.5rem, 6vw, 4rem); line-height:0.9; margin-bottom:5px;">
      United <span style="background:linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">2026</span>
    </h1>
    <p style="font-size:.85rem; color:var(--muted)">11 June – 19 July 2026 • Canada, Mexico and the United States • 48 Nations • 104 Matches</p>
  </div>
</div>

    <div class="mb-8 flex gap-3 overflow-x-auto pb-2 no-scrollbar" id="tabGroup"></div>

    <main id="mainContent" class="max-w-full mx-auto"></main>
  </div>

  <div class="fixed bottom-6 right-6 flex gap-3 z-[1000]">
    <button onclick="toggleEditMode()" id="editBtn" class="bg-blue-600 text-white px-6 py-3 rounded-full font-black text-[0.65rem] uppercase tracking-widest shadow-2xl">Toggle Edit Mode</button>
    <button onclick="resetToDefault()" class="bg-red-900/40 text-red-400 px-4 py-3 rounded-full font-black text-[0.65rem] uppercase tracking-widest border border-red-500/20">Reset</button>
  </div>

  <script>
    let editMode = false;
    let expandedMatches = new Set(); // Aici ținem minte ID-urile meciurilor deschise
    let WC2026_DATA = [];
    let activeTab = 0;
    let currentGroup = "Group A";
    const phases = ["Group Stage", "Round of 32", "Round of 16", "Quarter-finals", "Semi-finals", "3rd Place Playoff", "Final"];

    // --- INIȚIALIZARE ---
    async function init() {
      const saved = localStorage.getItem('wc2026_v1');
      if (saved) {
        WC2026_DATA = JSON.parse(saved);
        finishInit();
      } else {
        try {
          const response = await fetch('data_usa2026.json');
          const data = await response.json();
          WC2026_DATA = data.SCHEDULE || data;
          finishInit();
        } catch (e) {
          console.error("Eroare la încărcare:", e);
        }
      }
    }

    function finishInit() {
      activeTab = parseInt(localStorage.getItem('activeTab_2026')) || 0;
      currentGroup = localStorage.getItem('activeGroup_2026') || "Group A";
      showTab(activeTab);
    }

    // --- NAVIGARE ---
    function showTab(n, scroll = true) {
  activeTab = n;
  localStorage.setItem('activeTab_2026', n);
  renderTabs();
  
  const phaseName = phases[n];
  const finalStages = ["Semi-finals", "3rd Place Playoff", "Final"];

  if (phaseName === "Group Stage") {
    renderGroupStage();
  } else if (finalStages.includes(phaseName)) {
    renderFinalPhases(phaseName);
  } else {
    renderKnockoutPhase(phaseName);
  }
  
  // Executăm scroll-ul doar dacă este un tab nou (scroll=true)
  if (scroll) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}
    function renderTabs() {
      const container = document.getElementById('tabGroup');
      if (!container) return;
      container.innerHTML = phases.map((p, i) => `
        <button onclick="showTab(${i})" id="tab${i}" 
                class="tab-pill usa-pill ${activeTab === i ? 'active' : ''}">
          ${p}
        </button>
      `).join('');
    }

    // --- RENDER GRUPE (CU DETALII COMPLETE) ---
    function renderGroupStage() {
      const container = document.getElementById('mainContent');
      const groups = ["Group A", "Group B", "Group C", "Group D", "Group E", "Group F", "Group G", "Group H", "Group I", "Group J", "Group K", "Group L"];
      
      let html = `<div class="flex gap-2 mb-10 overflow-x-auto pb-4 no-scrollbar border-b border-white/5">`;
      groups.forEach(g => {
        html += `<button onclick="currentGroup='${g}'; localStorage.setItem('activeGroup_2026', '${g}'); renderGroupStage()" class="px-5 py-2 rounded-xl text-[0.7rem] font-bold uppercase transition-all whitespace-nowrap ${currentGroup === g ? 'bg-blue-600 text-white shadow-lg' : 'bg-white/5 text-muted'}">${g}</button>`;
      });
      html += `<button onclick="currentGroup='3rd-place'; localStorage.setItem('activeGroup_2026', '3rd-place'); renderGroupStage()" class="px-5 py-2 rounded-xl text-[0.7rem] font-bold uppercase transition-all ml-4 border border-blue-500/20 whitespace-nowrap ${currentGroup === '3rd-place' ? 'bg-blue-600 text-white shadow-lg' : 'bg-blue-900/10 text-blue-400'}">Best 3rd Places</button></div>`;

      if (currentGroup === '3rd-place') html += renderThirdPlaceRanking();
      else html += renderGroupMatchesAndTable(currentGroup);
      container.innerHTML = html;
    }

   function renderGroupMatchesAndTable(groupName) {
      const gData = WC2026_DATA.find(p => p.group === groupName);
      if (!gData) return '<p class="opacity-20 italic p-10 text-center">Data not found...</p>';

      // a) Forțăm recalcularea clasamentului înainte de fiecare afișare pentru auto-update
      calculateGroupStandings(gData);
      
      const top8ThirdPlaceNames = getTop8ThirdPlaceNames();

      return `
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
          <div class="lg:col-span-7 space-y-6">
            ${gData.matches.map(m => renderMatchCard(m)).join('')}
          </div>

          <div class="lg:col-span-5">
            <div class="sticky top-10 bg-white/5 rounded-[2.5rem] border border-white/10 overflow-hidden shadow-2xl backdrop-blur-md">
                <div class="p-5 bg-white/5 border-b border-white/5">
                  <h3 class="font-black uppercase tracking-widest text-[0.65rem] text-blue-500">Group Standings</h3>
                </div>
                <div class="overflow-x-auto">
                  <table class="w-full text-center text-[0.7rem]">
                      <thead class="opacity-30 uppercase font-black border-b border-white/5">
                          <tr>
                            <th class="py-4 px-4 text-left">Pos</th>
                            <th class="py-4 text-left">Team</th>
                            <th>M</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th>
                            <th class="px-4 text-right">P</th>
                          </tr>
                      </thead>
                      <tbody class="text-[0.75rem]">
                          ${gData.standings.map((s, idx) => {
                              let rowClass = "border-b border-white/5 transition-colors hover:bg-white/[0.02]";
                              if (idx < 2) rowClass += " bg-blue-500/10"; // Highlight albastru pentru Top 2
                              else if (idx === 2 && top8ThirdPlaceNames.includes(s.team)) rowClass += " bg-green-500/10"; // Verde pentru Best 3rd

                              return `
                              <tr class="${rowClass}">
                                  <td class="py-4 px-4 text-left font-black ${idx < 2 ? 'text-blue-400' : (idx === 2 && top8ThirdPlaceNames.includes(s.team) ? 'text-green-400' : 'text-muted')}">${idx + 1}</td>
                                  <td class="py-4 text-left">
                                      <div class="flex items-center gap-2">
                                          <img src="https://flagcdn.com/w40/${s.code}.png" class="w-5 rounded-sm shadow-sm">
                                          <span class="font-bold text-[0.85rem] whitespace-nowrap">${s.team}</span>
                                      </div>
                                  </td>
                                  <td>${s.m}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
                                  <td class="opacity-40">${s.gf}</td><td class="opacity-40">${s.ga}</td>
                                  <td class="font-bold ${s.gd >= 0 ? 'text-white/40' : 'text-red-400/40'}">${s.gd > 0 ? '+' + s.gd : s.gd}</td>
                                  <td class="py-4 px-4 text-right font-black ${idx < 2 ? 'text-blue-400' : (idx === 2 && top8ThirdPlaceNames.includes(s.team) ? 'text-green-400' : 'text-white/80')}">${s.pts}</td>
                              </tr>`;
                          }).join('')}
                      </tbody>
                  </table>
                </div>
            </div>
          </div>
        </div>`;
    }

    function renderMatchCard(m) {
      const s1 = parseInt(m.team1.score) || 0;
      const s2 = parseInt(m.team2.score) || 0;
      
      // c) Calcul logică Highlight și Fade
      let style1 = "color: #fff;";
      let style2 = "color: #fff;";

      if (m.status !== 'Scheduled') {
        if (s1 > s2) { 
          style1 = "color: var(--accent); opacity: 1;"; 
          style2 = "opacity: 0.2;"; 
        } else if (s2 > s1) { 
          style1 = "opacity: 0.2;"; 
          style2 = "color: var(--accent); opacity: 1;"; 
        }
      }

      return `
      <div class="match-card p-8 rounded-[2.5rem] ${m.status === 'Finished' ? 'opacity-80' : ''}">
        <div class="flex justify-between items-start mb-8 opacity-40 text-[0.55rem] font-black uppercase tracking-[0.2em]">
          <div class="flex flex-col gap-1"><span>${m.date}</span><span>${m.time}</span></div>
          <div class="text-right flex flex-col gap-1"><span>${m.stadium}</span><span>${m.city}</span></div>
        </div>
        
        <div class="flex items-center justify-between">
          <div class="flex-1 flex flex-col items-center gap-3 text-center">
            <img src="https://flagcdn.com/w80/${m.team1.code}.png" class="w-14 h-9 object-cover rounded border border-white/10 shadow-lg">
            <span class="font-bold text-[0.9rem] uppercase tracking-tight" style="${style1}">${m.team1.name}</span>
            <div class="mt-2 w-full max-w-[120px]">
              ${editMode ? 
                `<textarea onblur="updateScorers('${m.id}', 1, this.value)" class="bg-white/5 border border-white/10 rounded px-2 py-1 text-[0.6rem] w-full h-12 text-center text-blue-400 outline-none resize-none" placeholder="Scorers...">${m.team1.scorers || ''}</textarea>` : 
                `<div class="text-[0.65rem] text-muted text-center font-medium leading-tight uppercase">${formatRegularScorers(m.team1.scorers)}</div>`}
            </div>
          </div>

          <div class="flex flex-col items-center px-10">
            <div class="flex items-baseline gap-5">
              <div class="flex flex-col items-center">
                ${editMode ? `<button onclick="updateScore('${m.id}', 1, 1)" class="text-blue-500 mb-2 text-[0.7rem]">▲</button>` : ''}
                <span class="text-6xl font-black font-['Bebas_Neue']" style="${style1}">${m.team1.score}</span>
                ${editMode ? `<button onclick="updateScore('${m.id}', 1, -1)" class="text-blue-500 mt-2 text-[0.7rem]">▼</button>` : ''}
              </div>
              <span class="text-2xl opacity-10">-</span>
              <div class="flex flex-col items-center">
                ${editMode ? `<button onclick="updateScore('${m.id}', 2, 1)" class="text-blue-500 mb-2 text-[0.7rem]">▲</button>` : ''}
                <span class="text-6xl font-black font-['Bebas_Neue']" style="${style2}">${m.team2.score}</span>
                ${editMode ? `<button onclick="updateScore('${m.id}', 2, -1)" class="text-blue-500 mt-2 text-[0.7rem]">▼</button>` : ''}
              </div>
            </div>
            <span class="mt-4 px-4 py-1 rounded-full text-[0.55rem] font-black uppercase tracking-widest ${m.status === 'Live' ? 'bg-red-600 animate-pulse' : 'bg-white/10 text-white'}">${m.status}</span>
            ${editMode ? `<button onclick="toggleStatus('${m.id}')" class="mt-4 text-[0.45rem] text-blue-400 border border-blue-400/20 px-2 py-1 rounded uppercase font-bold hover:bg-blue-600 hover:text-white transition-all">Change Status</button>` : ''}
          </div>

          <div class="flex-1 flex flex-col items-center gap-3 text-center">
            <img src="https://flagcdn.com/w80/${m.team2.code}.png" class="w-14 h-9 object-cover rounded border border-white/10 shadow-lg">
            <span class="font-bold text-[0.9rem] uppercase tracking-tight" style="${style2}">${m.team2.name}</span>
            <div class="mt-2 w-full max-w-[120px]">
              ${editMode ? 
                `<textarea onblur="updateScorers('${m.id}', 2, this.value)" class="bg-white/5 border border-white/10 rounded px-2 py-1 text-[0.6rem] w-full h-12 text-center text-blue-400 outline-none resize-none" placeholder="Scorers...">${m.team2.scorers || ''}</textarea>` : 
                `<div class="text-[0.65rem] text-muted text-center font-medium leading-tight uppercase">${formatRegularScorers(m.team2.scorers)}</div>`}
            </div>
          </div>
        </div>
      </div>`;
    }

    // --- RENDER KNOCKOUT (R32 - QF) ---
    function renderKnockoutPhase(phaseName) {
    const container = document.getElementById('mainContent');
    const phaseData = WC2026_DATA.find(p => p.phase === phaseName);
    
    if (!phaseData) {
        container.innerHTML = `<p class="opacity-20 italic p-10 text-center">No data for ${phaseName}.</p>`;
        return;
    }

    const placeholderLogo = "https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/2026_FIFA_World_Cup_emblem_%28horizontal%2C_with_wordmark%29.svg/1024px-2026_FIFA_World_Cup_emblem_%28horizontal%2C_with_wordmark%29.svg.png";

    container.innerHTML = `
        <div class="max-w-6xl mx-auto pb-20 pt-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                ${phaseData.matches.map(m => {
                    const team1Name = getQualifiedTeam(m.team1.placeholder) || m.team1.name;
                    const team2Name = getQualifiedTeam(m.team2.placeholder) || m.team2.name;
                    
                    // În interiorul .map-ului din renderKnockoutPhase:
const s1 = parseInt(m.team1.score) || 0;
const s2 = parseInt(m.team2.score) || 0;
const p1 = parseInt(m.team1.penalties) || 0;
const p2 = parseInt(m.team2.penalties) || 0;
// Verificăm noua cheie 'penalty_shootout'
const hasPenalties = (m.team1.penalty_shootout && m.team1.penalty_shootout.trim() !== "") || (m.team2.penalty_shootout && m.team2.penalty_shootout.trim() !== "");

let style1 = "color: #fff;"; let style2 = "color: #fff;";
if (m.status === 'Finished') {
    const win1 = s1 > s2 || (s1 === s2 && p1 > p2);
    const win2 = s2 > s1 || (s1 === s2 && p2 > p1);
    if (win1) { style1 = "color: var(--accent); opacity: 1;"; style2 = "opacity: 0.2;"; }
    else if (win2) { style1 = "opacity: 0.2;"; style2 = "color: var(--accent); opacity: 1;"; }
}

// În zona de return HTML, înlocuiește m.team1.shootout cu m.team1.penalty_shootout:
// ${editMode ? `...penalty_shootout...` : `${formatShootout(m.team1.penalty_shootout)}`}

                    const code1 = getTeamCode(team1Name); const code2 = getTeamCode(team2Name);
                    const img1Url = code1 ? `https://flagcdn.com/w80/${code1}.png` : placeholderLogo;
                    const img2Url = code2 ? `https://flagcdn.com/w80/${code2}.png` : placeholderLogo;
                    const imgClass1 = code1 ? 'w-14 h-9 object-cover rounded shadow-lg' : 'w-24 h-8 object-contain opacity-20 invert grayscale';
                    const imgClass2 = code2 ? 'w-14 h-9 object-cover rounded shadow-lg' : 'w-24 h-8 object-contain opacity-20 invert grayscale';

                    return `
                    <div class="match-card p-8 rounded-[2.5rem] border border-white/5 transition-all hover:border-white/10">
                        <div class="flex justify-between items-start mb-8 opacity-40 text-[0.55rem] font-black uppercase tracking-[0.2em]">
                          <div class="flex flex-col gap-1">
                            <span class="text-blue-500 text-xs">${m.date} • ${m.time || '--:--'}</span>
                          </div>
                          <div class="text-right flex flex-col gap-1">
                            <span>${m.stadium || 'TBD Stadium'}</span>
                            <span>${m.city}</span>
                          </div>
                        </div>
                        
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex-1 flex flex-col items-center">
                                <img src="${img1Url}" class="${imgClass1} mb-4">
                                <span class="font-bold text-[0.85rem] uppercase text-center mb-6 leading-tight" style="${style1}">${team1Name}</span>
                                <div class="w-full">
                                    ${editMode ? `<textarea onblur="updateKnockoutDetail('${m.id}', 1, 'scorers120', this.value)" class="bg-white/5 border border-white/10 rounded p-2 text-[0.6rem] text-white w-full h-14 outline-none resize-none leading-relaxed">${m.team1.scorers120 || ''}</textarea>` : `<div class="text-[0.6rem] text-muted font-medium uppercase min-h-[1.5rem] leading-relaxed">${formatRegularScorers(m.team1.scorers120)}</div>`}
                                </div>
                            </div>

                            <div class="flex flex-col items-center px-2">
                                <div class="flex items-center gap-4 h-[60px]"> 
                                    <div class="flex flex-col items-center">
                                        ${editMode ? `<button onclick="updateKnockoutScore('${m.id}', 1, 'score', 1)" class="text-blue-500 text-[0.6rem] mb-1">▲</button>` : ''}
                                        <span class="text-5xl font-black font-['Bebas_Neue']" style="${style1}">${m.team1.score}</span>
                                        ${editMode ? `<button onclick="updateKnockoutScore('${m.id}', 1, 'score', -1)" class="text-blue-500 text-[0.6rem] mt-1">▼</button>` : ''}
                                    </div>
                                    <span class="opacity-10 text-xl">-</span>
                                    <div class="flex flex-col items-center">
                                        ${editMode ? `<button onclick="updateKnockoutScore('${m.id}', 2, 'score', 1)" class="text-blue-500 text-[0.6rem] mb-1">▲</button>` : ''}
                                        <span class="text-5xl font-black font-['Bebas_Neue']" style="${style2}">${m.team2.score}</span>
                                        ${editMode ? `<button onclick="updateKnockoutScore('${m.id}', 2, 'score', -1)" class="text-blue-500 text-[0.6rem] mt-1">▼</button>` : ''}
                                    </div>
                                </div>
                                <span class="mt-4 px-4 py-1 rounded-full text-[0.5rem] font-black uppercase tracking-widest ${m.status === 'Live' ? 'bg-red-600 animate-pulse text-white shadow-[0_0_15px_rgba(220,38,38,0.5)]' : 'bg-white/10 text-white'}">${m.status}</span>
                            </div>

                            <div class="flex-1 flex flex-col items-center">
                                <img src="${img2Url}" class="${imgClass2} mb-4">
                                <span class="font-bold text-[0.85rem] uppercase text-center mb-6 leading-tight" style="${style2}">${team2Name}</span>
                                <div class="w-full text-right">
                                    ${editMode ? `<textarea onblur="updateKnockoutDetail('${m.id}', 2, 'scorers120', this.value)" class="bg-white/5 border border-white/10 rounded p-2 text-[0.6rem] text-white w-full h-14 outline-none resize-none text-right leading-relaxed">${m.team2.scorers120 || ''}</textarea>` : `<div class="text-[0.6rem] text-muted font-medium uppercase text-right min-h-[1.5rem] leading-relaxed">${formatRegularScorers(m.team2.scorers120)}</div>`}
                                </div>
                            </div>
                        </div>

                        <div class="mt-6 pt-6 border-t border-white/5 flex items-start justify-between gap-4">
                            <div class="flex-1">
                                ${editMode ? `<textarea onblur="updateKnockoutDetail('${m.id}', 1, 'Penalty Shootout', this.value)" class="bg-red-500/5 border border-red-500/10 rounded p-2 text-[0.6rem] text-red-400 w-full h-20 outline-none resize-none leading-relaxed">${m.team1.shootout || ''}</textarea>` : `<div class="text-[0.6rem] font-bold uppercase text-red-500/80 leading-relaxed">${formatShootout(m.team1.shootout)}</div>`}
                            </div>

                            <div class="flex flex-col items-center px-2 min-w-[80px]">

    function calculateGroupStandings(group) {
      if (!group || !group.standings) return;
      group.standings.forEach(s => { s.m=0; s.w=0; s.d=0; s.l=0; s.gf=0; s.ga=0; s.gd=0; s.pts=0; });
      group.matches.forEach(m => {
        if (m.status === "Finished") {
          const t1 = group.standings.find(s => s.team === m.team1.name);
          const t2 = group.standings.find(s => s.team === m.team2.name);
          const s1 = parseInt(m.team1.score); const s2 = parseInt(m.team2.score);
          if (t1 && t2) {
            t1.m++; t2.m++; t1.gf += s1; t1.ga += s2; t2.gf += s2; t2.ga += s1;
            if (s1 > s2) { t1.w++; t1.pts += 3; t2.l++; } else if (s2 > s1) { t2.w++; t2.pts += 3; t1.l++; } else { t1.d++; t2.d++; t1.pts += 1; t2.pts += 1; }
          }
        }
      });
      group.standings.forEach(s => { s.gd = s.gf - s.ga; });
      group.standings.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    }

    function renderThirdPlaceRanking() {
      let thirds = [];
      WC2026_DATA.forEach(g => { if (g.standings && g.standings[2]) thirds.push({ ...g.standings[2], group: g.group.replace("Group ","") }); });
      thirds.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || b.w - a.w);
      return `<div class="max-w-4xl mx-auto pb-20"><table class="w-full text-center text-sm">
        <thead class="opacity-30 uppercase font-black"><tr><th class="py-4">Rank</th><th class="text-left">Team</th><th>G</th><th>M</th><th>GD</th><th class="px-4">P</th></tr></thead>
        <tbody>${thirds.map((s, i) => `<tr class="border-b border-white/5 ${i<8?'bg-blue-500/5':''}">
          <td class="py-4 font-black">${i+1}</td><td class="text-left font-bold">${s.team}</td><td>${s.group}</td><td>${s.m}</td><td>${s.gd}</td><td class="font-black text-blue-400">${s.pts}</td>
        </tr>`).join('')}</tbody></table></div>`;
    }

      WC2026_DATA.forEach(g => { if (g.standings && g.standings[2]) thirds.push(g.standings[2]); });
      thirds.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || b.w - a.w);
      return thirds.slice(0, 8).map(t => t.team);
    }
function updatePlayer(matchId, teamNum, category, index, field, value) {
    const phaseName = phases[activeTab];
    const phaseData = WC2026_DATA.find(p => p.phase === phaseName);
    const match = phaseData.matches.find(m => m.id === matchId);
    if (!match) return;

    const team = teamNum === 1 ? match.team1 : match.team2;
    const key = category === 'Starting XI' ? 'lineup_start' : 'lineup_bench';
    
    if (!team[key]) team[key] = [];
    if (!team[key][index]) team[key][index] = { no: '', name: '', pos: 'GK' };
    
    team[key][index][field] = value;
    save();
}
    function getQualifiedTeam(placeholder) {
    if (!placeholder) return null;

    // Detectăm dacă placeholder-ul cere Câștigătorul sau Pierzătorul unui meci anterior
    const winnerMatch = placeholder.match(/^Winner Match (\d+)$/);
    const loserMatch = placeholder.match(/^Loser Match (\d+)$/);
    
    if (winnerMatch || loserMatch) {
        const matchId = (winnerMatch || loserMatch)[1];
        let foundMatch = null;
        
        // Căutăm meciul în toate fazele
        for (let phase of WC2026_DATA) {
            if (phase.matches) {
                foundMatch = phase.matches.find(m => m.id === matchId);
                if (foundMatch) break;
            }
        }

        if (foundMatch && foundMatch.status === "Finished") {
            const s1 = parseInt(foundMatch.team1.score) || 0;
            const s2 = parseInt(foundMatch.team2.score) || 0;
            const p1 = parseInt(foundMatch.team1.penalties) || 0;
            const p2 = parseInt(foundMatch.team2.penalties) || 0;

            const team1Won = s1 > s2 || (s1 === s2 && p1 > p2);

            if (winnerMatch) {
                // Returnăm câștigătorul
                return team1Won ? 
                    (getQualifiedTeam(foundMatch.team1.placeholder) || foundMatch.team1.name) : 
                    (getQualifiedTeam(foundMatch.team2.placeholder) || foundMatch.team2.name);
            } else {
                // Returnăm pierzătorul (pentru Finala Mică)
                return team1Won ? 
                    (getQualifiedTeam(foundMatch.team2.placeholder) || foundMatch.team2.name) : 
                    (getQualifiedTeam(foundMatch.team1.placeholder) || foundMatch.team1.name);
            }
        }
        return placeholder;
    }

    // Aici poți adăuga restul logicii pentru 1A, 2B etc., dacă este necesar
    return placeholder;
}

    function getTeamCode(name) { for (let g of WC2026_DATA) { if(g.standings) { let f = g.standings.find(s => s.team === name); if(f) return f.code; } } return ''; }
    function formatRegularScorers(t) { if(!t) return ""; return t.split('\n').map(l => l.trim()?`⚽ ${l.trim()}`:"").join('<br>'); }
    function formatShootout(t) { if(!t) return ""; return t.split('\n').map(l => l.includes('(G)')?`<span class="text-green-400">✔️ ${l.replace('(G)','')}</span>`:`<span class="text-red-500">❌ ${l.replace('(M)','')}</span>`).join('<br>'); }
    function toggleDetails(id) {
    const el = document.getElementById(`details-${id}`);
    const btnText = document.getElementById(`btn-text-${id}`);
    const icon = document.getElementById(`icon-${id}`);
    
    if (el.classList.contains('hidden')) {
        el.classList.remove('hidden');
        expandedMatches.add(id); // Salvăm faptul că e deschis
        if(btnText) btnText.innerText = 'Hide Match Details';
        if(icon) icon.style.transform = 'rotate(180deg)';
    } else {
        el.classList.add('hidden');
        expandedMatches.delete(id); // Îl ștergem din listă
        if(btnText) btnText.innerText = 'Show Match Details';
        if(icon) icon.style.transform = 'rotate(0deg)';
    }
}

  editMode = !editMode;
  const btn = document.getElementById('editBtn');
  if(btn) btn.classList.toggle('bg-green-600', editMode);
  showTab(activeTab, false);
}
    function save() {
  localStorage.setItem('wc2026_v1', JSON.stringify(WC2026_DATA));
  showTab(activeTab, false);
}
    function resetToDefault() { if(confirm("Reset?")) { localStorage.removeItem('wc2026_v1'); location.reload(); } }
    
    function updateScore(id, tNum, d) { WC2026_DATA.forEach(g => g.matches?.forEach(m => { if(m.id===id) { if(tNum===1) m.team1.score=Math.max(0,parseInt(m.team1.score)+d); else m.team2.score=Math.max(0,parseInt(m.team2.score)+d); calculateGroupStandings(g); } })); save(); }
    function updateScorers(id, tNum, v) { WC2026_DATA.forEach(g => g.matches?.forEach(m => { if(m.id===id) { if(tNum===1) m.team1.scorers=v; else m.team2.scorers=v; } })); save(); }
    function updateKnockoutDetail(matchId, teamNum, field, val) {
    WC2026_DATA.forEach(phase => {
        if (phase.matches) {
            const match = phase.matches.find(m => m.id === matchId);
            if (match) {
                const team = teamNum === 1 ? match.team1 : match.team2;
                team[field] = val;
            }
        }
    });
    save();
}
    function updateKnockoutScore(id, tNum, field, d) { WC2026_DATA.forEach(p => p.matches?.forEach(m => { if(m.id===id) { let t = tNum===1?m.team1:m.team2; t[field]=Math.max(0,(parseInt(t[field])||0)+d); } })); save(); }
    function toggleStatus(id) { const states = ["Scheduled", "Live", "Finished"]; WC2026_DATA.forEach(g => g.matches?.forEach(m => { if(m.id===id) { m.status = states[(states.indexOf(m.status)+1)%3]; calculateGroupStandings(g); } })); save(); }
    function toggleKnockoutStatus(id, phase) { const states = ["Scheduled", "Live", "Finished"]; WC2026_DATA.find(p=>p.phase===phase).matches.find(m=>m.id===id).status = states[(states.indexOf(WC2026_DATA.find(p=>p.phase===phase).matches.find(m=>m.id===id).status)+1)%3]; save(); }
